domain: "light"

# 音声アシスタント（Lightエンティティ）用の標準マッピング
mapping:
  turn_on: "FULL_LIGHT"
  turn_off: "POWER_OFF"

buttons:
  # --- 基本操作 ---
  FULL_LIGHT: "AEHA_01103050AF00FF02FDC23D"  # 全灯
  NIGHT_LIGHT: "AEHA_01103050AF00FF09F6C23D" # 保安灯
  POWER_OFF: "AEHA_01103050AF00FF03FCC23D"   # 消灯

  # --- 調光・調色（カバー内） ---
  BRIGHTNESS_UP: "AEHA_01103050AF00FF06F9C23D"   # 明るさ（明）
  BRIGHTNESS_DOWN: "AEHA_01103050AF00FF07F8C23D" # 明るさ（暗）
  COLOR_WHITE: "AEHA_01103050AF00FF0EF1C23D"     # 光色（白）
  COLOR_WARM: "AEHA_01103050AF00FF0FF0C23D"      # 光色（暖）

  # --- あかりセレクト ---
  CUSTOM_A: "AEHA_01103050AF00FF0AF5F20D" # A さわやか 蛍光灯
  CUSTOM_B: "AEHA_01103050AF00FF09F6F20D" # B よみかき 図書館
  CUSTOM_C: "AEHA_01103050AF00FF08F7F20D" # C だんらん 食卓
  CUSTOM_D: "AEHA_01103050AF00FF07F8F20D" # D くつろぎ 電球

  # --- 特殊モード ---
  ECO: "AEHA_01103050AF00FF0CF3C23D"       # ECO これっきり
  RAKU_MIEE: "AEHA_01103050AF00FF18E7F20D" # ラク見え

  # --- 節電（状態ごとに独立したボタンとして生成） ---
  POWER_SAVE_1: "AEHA_01103050AF00FF10EFF20D" # 節電（1段階目）
  POWER_SAVE_2: "AEHA_01103050AF00FF11EEF20D" # 節電（2段階目）
  POWER_SAVE_0: "AEHA_01103050AF00FF15EAF20D" # 節電（解除/0）

  # --- おやすみタイマー（状態ごとに独立したボタンとして生成） ---
  SLEEP_30: "AEHA_01103050AF00FF01FEF20D"       # おやすみ（30分）
  SLEEP_60: "AEHA_01103050AF00FF0CF3F20D"       # おやすみ（60分）
  SLEEP_NIGHT_30: "AEHA_01103050AF00FF0BF4F20D" # おやすみ（保安灯30分）
  SLEEP_NIGHT_60: "AEHA_01103050AF00FF0DF2F20D" # おやすみ（保安灯60分）