# IR-Trigger.yaml

mode_entity: input_select.ir_remote_mode

transmitters:
  tx_study_ad00020p:
    name: "スタディのIR送信機 (AD00020P)"
    type: "local_usb"
    index: 1
    local_receivers:
      - "rx_study_ad00020p"
      - "rx_study_atom"
  tx_living_atom:
    name: "リビングのIR送信機 (AtomS3)"
    type: "esphome"
    entity_id: "remote.atom_s3_living"
    local_receivers:
      - "rx_living_ad00020p"

devices:
  Master_CRT1:
    name: "C-RT1"
    buttons:
      MODE_TV: "NEC_56A94AB5"
      MODE_REC: "NEC_56A939C6"

  Target_TV_Study:
    name: "スタディのテレビ"
    transmitter: "tx_study_ad00020p"
    buttons:
      VOL_UP: "NEC_56A912ED"
      VOL_DOWN: "NEC_56A915EA"

  Target_TV_Living:
    name: "リビングのテレビ"
    transmitter: "tx_living_atom"
    buttons:
      VOL_UP: "AEHA_1111"
      VOL_DOWN: "AEHA_2222"

modes:
  always: # 常に有効なグローバルモード（中継用）
    repeat:
      - Target_TV_Study
      - Target_TV_Living

  TV:
    bind:
      source: Master_CRT1
      target: Target_TV_Study
    remap:
      "NEC_56A939C6":
        - service: input_select.select_option
          target: { entity_id: input_select.ir_remote_mode }
          data: { option: "Recorder" }
