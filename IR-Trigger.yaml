# IR-Trigger.yaml
mode_entity: input_select.ir_remote_mode

transmitters:
  tx_study_ad00020p:
    name: "スタディのIR送信機 (AD00020P)"
    type: local_usb
    index: 1
    local_receivers:
      - rx_study_ad00020p
      - rx_study_atom
  tx_living_atom:
    name: "リビングのIR送信機 (AtomS3)"
    type: "esphome"
    entity_id: "remote.atom_s3_living"
    local_receivers:
      - rx_living_ad00020p

devices:
  Master_CRT1:
    name: "C-RT1"
    template: "C-RT1"

  Target_TV_Study:
    name: "スタディのテレビ"
    transmitter: "tx_study_ad00020p"
    template: "J-MX100RC"

  Target_TV_Living:
    name: "リビングのテレビ"
    transmitter: "tx_living_atom"
    template: "J-MX100RC"

  Target_Recorder_Study:
    name: "スタディのレコーダー"
    transmitter: "tx_study_ad00020p"
    template: "RC-R2"

  Target_HDMI_Study:
    name: "スタディのHDMI"
    transmitter: "tx_study_ad00020p"
    force_aeha_tx: true
    template: "HDMI-Switcher"

  Target_Light_Living:
    name: "リビングの照明"
    transmitter: "tx_living_atom"
    template: "IR-A04HS"

modes:
  always:
    repeat:
      - Target_TV_Study
      - Target_TV_Living
      - Target_Recorder_Study
      - Target_HDMI_Study
      - Target_Light_Living
  TV:
    bind:
      - source: Master_CRT1
        target: Target_TV_Study
    remap:
      "NEC_56A939C6":
        - service: input_select.select_option
          target: { entity_id: input_select.ir_remote_mode }
          data: { option: "Recorder" }
