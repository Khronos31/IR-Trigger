substitutions:
  name: "atoms3-ir"
  friendly_name: "AtomS3 IR Trigger"
  ha_ip: "192.168.1.130" # Replace with your HA IP
  receiver_id: "rx_atoms3_01" # This must match one of 'receivers' in IR-Trigger configuration

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Enable logging
logger:

# Hybrid Architecture:
# - TX: Uses Native Home Assistant API
# - RX: Uses HTTP Webhook for RAW pulse distribution (Dumb Pipe)
api:
  encryption:
    key: !secret api_encryption_key
  actions:
    - action: send_raw
      variables:
        command: int[]
      then:
        - remote_transmitter.transmit_raw: 
            code: !lambda 'return command;'

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

http_request:
  timeout: 5s

remote_transmitter:
  id: ir_tx
  pin: GPIO2
  carrier_duty_percent: 50%
  non_blocking: true

remote_receiver:
  pin: 
    number: GPIO1  # AtomS3 Built-in IR Receiver
    inverted: true
  dump: all
  filter: 120us
  idle: 25ms
  # "Dumb Pipe" architecture: Send raw pulses to HA for central processing via Webhook.
  on_raw:
    then:
      - if:
          condition:
            lambda: 'return x.size() > 20;'
          then:
            - http_request.post:
                url: !lambda |-
                  return "http://${ha_ip}:8123/api/webhook/${receiver_id}";
                request_headers:
                  Content-Type: application/json
                body: !lambda |-
                  // Construct raw JSON array from pulses. OFF times are normalized to positive integers for HA processing.
                  std::string payload = "{\"raw\":[";
                  for (size_t i = 0; i < x.size(); i++) {
                    payload += std::to_string(std::abs(x[i]));
                    if (i < x.size() - 1) payload += ", ";
                  }
                  payload += "]}";
                  return payload;
