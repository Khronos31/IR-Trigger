substitutions:
  name: "m5stick-s3-ir"
  friendly_name: "M5StickS3 IR Trigger"
  ha_ip: "192.168.1.10"
  receiver_id: "rx_living_m5stick"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: m5stick-c
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API (optional if only using Webhook)
api:

ota:

wifi:
  ssid: "YOUR_SSID"
  password: "YOUR_PASSWORD"

http_request:
  timeout: 5s

remote_receiver:
  pin: 
    number: GPIO33  # Grove Port (G33) is typically used for IR Receiver Unit
    inverted: true
  dump: all
  # NEC Format
  on_nec:
    then:
      - http_request.post:
          url: !lambda |-
            return "http://${ha_ip}:8123/api/webhook/${receiver_id}";
          json: !lambda |-
            char buffer[64];
            sprintf(buffer, "{\"code\": \"NEC_%04X%04X\"}", x.address, x.command);
            return std::string(buffer);
  
  # AEHA Format (Panasonic)
  on_panasonic:
    then:
      - http_request.post:
          url: !lambda |-
            return "http://${ha_ip}:8123/api/webhook/${receiver_id}";
          json: !lambda |-
            char buffer[64];
            sprintf(buffer, "{\"code\": \"AEHA_%04X%08X\"}", x.address, x.command);
            return std::string(buffer);

  # SONY Format
  on_sony:
    then:
      - http_request.post:
          url: !lambda |-
            return "http://${ha_ip}:8123/api/webhook/${receiver_id}";
          json: !lambda |-
            char buffer[64];
            sprintf(buffer, "{\"code\": \"SONY_%08X\"}", x.data);
            return std::string(buffer);

# M5StickS3 Built-in Display (Optional)
# display:
#   - platform: st7789v
#     ...
